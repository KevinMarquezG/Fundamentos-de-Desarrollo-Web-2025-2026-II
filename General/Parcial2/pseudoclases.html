<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclases</title>
    <style>
        div{
            width: 250px;
            height: 250px;
            background-color: blue;
        }

        div:active{
            background-color: red;
            width: 500px;
            height: 500px;
        }

        p{
            background-color: green;
            font-size: medium;
        }

        p:hover{
            background-color: aquamarine;
            font-size: large;
        }
    </style>
</head>
<body>
    <div>

    </div>

    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptatum corrupti rem ipsam perspiciatis ex, hic optio 
        officia eligendi cupiditate dignissimos nesciunt eum accusantium deleniti repellendus numquam, ratione reiciendis, 
        quibusdam placeat!
    </p>
</body>
</html>
